version: 2.1

orbs:
  go: circleci/go@1.9.0
  docker: circleci/docker@2.4.0

jobs:
  build:
    docker:
      - image: cimg/go:1.21
    steps:
      - checkout
      - go/load-cache
      - go/mod-download
      - go/save-cache
      - run:
          name: Build
          command: go build -v -o bin/app ./...
      - persist_to_workspace:
          root: .
          paths: [bin/]

  lint:
    docker:
      - image: cimg/go:1.21
    steps:
      - checkout
      - go/load-cache
      - go/mod-download
      - run:
          name: Vet
          command: go vet ./...

  test:
    docker:
      - image: cimg/go:1.21
    steps:
      - checkout
      - go/load-cache
      - go/mod-download
      - run:
          name: Test
          command: go test -v -race -coverprofile=coverage.out ./...
      - store_artifacts:
          path: coverage.out

  docker-build:
    executor: docker/docker
    steps:
      - setup_remote_docker
      - checkout
      - docker/check
      - docker/build:
          image: myregistry/go-app
          tag: ${CIRCLE_SHA1},latest
      - docker/push:
          image: myregistry/go-app
          tag: ${CIRCLE_SHA1},latest

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - run: |
          echo "Deploying myregistry/go-app:${CIRCLE_SHA1} to staging"
          # Docker: docker run -d -p 8080:8080 myregistry/go-app:${CIRCLE_SHA1}
          # docker-compose up -d
          # Kubernetes: kubectl set image deployment/go-app go-app=myregistry/go-app:${CIRCLE_SHA1}
          # helm upgrade --install go-app ./chart --set image.tag=${CIRCLE_SHA1}

workflows:
  build-test-deploy:
    jobs:
      - build
      - lint
      - test:
          requires: [build]
      - docker-build:
          requires: [lint, test]
      - deploy:
          requires: [docker-build]
