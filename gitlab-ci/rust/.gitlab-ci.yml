# ---------------------------------------------------------------------------
# GitLab CI/CD Pipeline -- Rust
# Stages: build -> lint -> test -> docker -> deploy
# Uses: CI_REGISTRY, CI_REGISTRY_USER, CI_REGISTRY_PASSWORD (auto-injected)
# ---------------------------------------------------------------------------

stages:
  - build
  - lint
  - test
  - docker
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE/rust-app
  CARGO_HOME: $CI_PROJECT_DIR/.cargo

cache:
  paths:
    - .cargo/
    - target/

build:
  stage: build
  image: rust:1.73-slim
  script:
    - cargo build --release
  artifacts:
    paths:
      - target/release/sample-rust-app
    expire_in: 1 hour

lint:
  stage: lint
  image: rust:1.73-slim
  script:
    - rustup component add clippy rustfmt
    - cargo clippy -- -D warnings
    - cargo fmt -- --check

test:
  stage: test
  image: rust:1.73-slim
  script:
    - cargo test --verbose

docker:
  stage: docker
  image: docker:24.0
  services:
    - docker:24.0-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_SHA -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHA
    - docker push $DOCKER_IMAGE:latest

deploy:
  stage: deploy
  image: alpine:3.18
  script:
    - echo "Deploying $DOCKER_IMAGE:$CI_COMMIT_SHA to staging"
    - "# Docker: docker run -d -p 8080:8080 $DOCKER_IMAGE:$CI_COMMIT_SHA"
    - "# docker-compose up -d"
    - "# Kubernetes: kubectl set image deployment/rust-app rust-app=$DOCKER_IMAGE:$CI_COMMIT_SHA"
    - "# helm upgrade --install rust-app ./chart --set image.tag=$CI_COMMIT_SHA"
  environment:
    name: staging
  when: manual
