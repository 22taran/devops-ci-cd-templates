# ---------------------------------------------------------------------------
# GitLab CI/CD Pipeline -- Python
# Stages: build -> lint -> test -> docker -> deploy
# Uses: CI_REGISTRY, CI_REGISTRY_USER, CI_REGISTRY_PASSWORD (auto-injected)
# ---------------------------------------------------------------------------

stages:
  - build
  - lint
  - test
  - docker
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE/python-app
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

cache:
  paths:
    - .pip-cache/
    - venv/

build:
  stage: build
  image: python:3.12-slim
  script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt

lint:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install flake8
    - flake8 app.py --max-line-length=120 --statistics

test:
  stage: test
  image: python:3.12-slim
  script:
    - pip install -r requirements.txt
    - pytest tests/ -v --cov=. --cov-report=xml --cov-report=html
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - htmlcov/
    expire_in: 7 days
  coverage: '/TOTAL.*\s+(\d+%)/'

docker:
  stage: docker
  image: docker:24.0
  services:
    - docker:24.0-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_SHA -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHA
    - docker push $DOCKER_IMAGE:latest

deploy:
  stage: deploy
  image: alpine:3.18
  script:
    - echo "Deploying $DOCKER_IMAGE:$CI_COMMIT_SHA to staging"
    - "# Docker: docker run -d -p 8080:8080 $DOCKER_IMAGE:$CI_COMMIT_SHA"
    - "# docker-compose up -d"
    - "# Kubernetes: kubectl set image deployment/python-app python-app=$DOCKER_IMAGE:$CI_COMMIT_SHA"
    - "# helm upgrade --install python-app ./chart --set image.tag=$CI_COMMIT_SHA"
  environment:
    name: staging
  when: manual
