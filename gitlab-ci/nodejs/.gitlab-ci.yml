# ---------------------------------------------------------------------------
# GitLab CI/CD Pipeline -- Node.js
# Stages: build -> lint -> test -> docker -> deploy
# Uses: CI_REGISTRY, CI_REGISTRY_USER, CI_REGISTRY_PASSWORD (auto-injected)
# ---------------------------------------------------------------------------

stages:
  - build
  - lint
  - test
  - docker
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE/nodejs-app

cache:
  paths:
    - node_modules/

build:
  stage: build
  image: node:18-alpine
  script:
    - npm ci

lint:
  stage: lint
  image: node:18-alpine
  script:
    - npm ci
    - npm run lint

test:
  stage: test
  image: node:18-alpine
  script:
    - npm ci
    - npm test -- --coverage --ci
  artifacts:
    paths:
      - coverage/
    expire_in: 7 days
  coverage: '/All files.*?\|.*?\s+([\d.]+)/'

docker:
  stage: docker
  image: docker:24.0
  services:
    - docker:24.0-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_SHA -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHA
    - docker push $DOCKER_IMAGE:latest

deploy:
  stage: deploy
  image: alpine:3.18
  script:
    - echo "Deploying $DOCKER_IMAGE:$CI_COMMIT_SHA to staging"
    - "# Docker: docker run -d -p 8080:8080 $DOCKER_IMAGE:$CI_COMMIT_SHA"
    - "# docker-compose up -d"
    - "# Kubernetes: kubectl set image deployment/nodejs-app nodejs-app=$DOCKER_IMAGE:$CI_COMMIT_SHA"
    - "# helm upgrade --install nodejs-app ./chart --set image.tag=$CI_COMMIT_SHA"
  environment:
    name: staging
    url: https://staging.example.com
  when: manual
