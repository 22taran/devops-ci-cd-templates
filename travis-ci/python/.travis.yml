language: python
python:
  - "3.12"
  - "3.11"

cache: pip

install:
  - pip install -r requirements.txt

stages:
  - lint
  - test
  - docker
  - deploy

jobs:
  include:
    - stage: lint
      name: "Lint"
      script: flake8 app.py --max-line-length=120

    - stage: test
      name: "Test"
      script: pytest tests/ -v --cov=. --cov-report=html

    - stage: docker
      name: "Docker Build & Push"
      if: branch = main
      services:
        - docker
      script:
        - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
        - docker build -t myregistry/python-app:$TRAVIS_COMMIT .
        - docker push myregistry/python-app:$TRAVIS_COMMIT

    - stage: deploy
      name: "Deploy"
      if: branch = main
      script:
        - echo "Deploying to staging"
