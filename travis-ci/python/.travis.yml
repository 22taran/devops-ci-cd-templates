language: python
python:
  - "3.12"
  - "3.11"

cache: pip

install:
  - pip install -r requirements.txt

stages:
  - lint
  - test
  - docker
  - deploy

jobs:
  include:
    - stage: lint
      name: "Lint"
      script: flake8 app.py --max-line-length=120

    - stage: test
      name: "Test"
      script: pytest tests/ -v --cov=. --cov-report=html

    - stage: docker
      name: "Docker Build"
      services:
        - docker
      script:
        - docker build -t myregistry/python-app:$TRAVIS_COMMIT -t myregistry/python-app:latest .

    - stage: docker
      name: "Docker Push"
      services:
        - docker
      script:
        - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
        - docker push myregistry/python-app:$TRAVIS_COMMIT
        - docker push myregistry/python-app:latest

    - stage: deploy
      name: "Deploy"
      script:
        - echo "Deploying myregistry/python-app:$TRAVIS_COMMIT to staging"
        - "# Docker: docker run -d -p 8080:8080 myregistry/python-app:$TRAVIS_COMMIT"
        - "# docker-compose up -d"
        - "# Kubernetes: kubectl set image deployment/python-app python-app=myregistry/python-app:$TRAVIS_COMMIT"
        - "# helm upgrade --install python-app ./chart --set image.tag=$TRAVIS_COMMIT"
