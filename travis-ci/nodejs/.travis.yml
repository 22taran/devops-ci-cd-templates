language: node_js
node_js:
  - 18
  - 20

cache:
  npm: true

stages:
  - build
  - lint
  - test
  - docker
  - deploy

jobs:
  include:
    - stage: build
      name: "Install"
      script: npm ci

    - stage: lint
      name: "Lint"
      script:
        - npm ci
        - npm run lint

    - stage: test
      name: "Test"
      script:
        - npm ci
        - npm test -- --coverage --ci

    - stage: docker
      name: "Docker Build & Push"
      if: branch = main
      services:
        - docker
      script:
        - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
        - docker build -t myregistry/nodejs-app:$TRAVIS_COMMIT .
        - docker push myregistry/nodejs-app:$TRAVIS_COMMIT

    - stage: deploy
      name: "Deploy"
      if: branch = main
      script:
        - echo "Deploying to staging"
