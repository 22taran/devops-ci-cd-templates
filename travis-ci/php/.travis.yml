language: php
php:
  - "8.2"

cache:
  directories:
    - vendor

install:
  - composer install --no-interaction --prefer-dist

stages:
  - lint
  - test
  - docker
  - deploy

jobs:
  include:
    - stage: lint
      script:
        - vendor/bin/phpcs src/ --standard=PSR12
        - vendor/bin/phpstan analyse src/ --level=5

    - stage: test
      script: vendor/bin/phpunit tests/

    - stage: docker
      name: "Docker Build"
      services: docker
      script:
        - docker build -t myregistry/php-app:$TRAVIS_COMMIT -t myregistry/php-app:latest .

    - stage: docker
      name: "Docker Push"
      services: docker
      script:
        - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
        - docker push myregistry/php-app:$TRAVIS_COMMIT
        - docker push myregistry/php-app:latest

    - stage: deploy
      name: "Deploy"
      script:
        - echo "Deploying myregistry/php-app:$TRAVIS_COMMIT to staging"
        - "# Docker: docker run -d -p 8080:8080 myregistry/php-app:$TRAVIS_COMMIT"
        - "# docker-compose up -d"
        - "# Kubernetes: kubectl set image deployment/php-app php-app=myregistry/php-app:$TRAVIS_COMMIT"
        - "# helm upgrade --install php-app ./chart --set image.tag=$TRAVIS_COMMIT"
