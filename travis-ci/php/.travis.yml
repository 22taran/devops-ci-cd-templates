language: php
php:
  - "8.2"

cache:
  directories:
    - vendor

install:
  - composer install --no-interaction --prefer-dist

stages:
  - lint
  - test
  - docker
  - deploy

jobs:
  include:
    - stage: lint
      script:
        - vendor/bin/phpcs src/ --standard=PSR12
        - vendor/bin/phpstan analyse src/ --level=5

    - stage: test
      script: vendor/bin/phpunit tests/

    - stage: docker
      if: branch = main
      services: docker
      script:
        - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
        - docker build -t myregistry/php-app:$TRAVIS_COMMIT .
        - docker push myregistry/php-app:$TRAVIS_COMMIT

    - stage: deploy
      if: branch = main
      script: echo "Deploying to staging"
