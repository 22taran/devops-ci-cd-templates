language: ruby
rvm:
  - 3.3

cache: bundler

stages:
  - build
  - lint
  - test
  - docker
  - deploy

jobs:
  include:
    - stage: build
      script: bundle install

    - stage: lint
      script: bundle exec rubocop

    - stage: test
      script: bundle exec rspec --format documentation

    - stage: docker
      name: "Docker Build"
      services: docker
      script:
        - docker build -t myregistry/ruby-app:$TRAVIS_COMMIT -t myregistry/ruby-app:latest .

    - stage: docker
      name: "Docker Push"
      services: docker
      script:
        - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
        - docker push myregistry/ruby-app:$TRAVIS_COMMIT
        - docker push myregistry/ruby-app:latest

    - stage: deploy
      name: "Deploy"
      script:
        - echo "Deploying myregistry/ruby-app:$TRAVIS_COMMIT to staging"
        - "# Docker: docker run -d -p 8080:8080 myregistry/ruby-app:$TRAVIS_COMMIT"
        - "# docker-compose up -d"
        - "# Kubernetes: kubectl set image deployment/ruby-app ruby-app=myregistry/ruby-app:$TRAVIS_COMMIT"
        - "# helm upgrade --install ruby-app ./chart --set image.tag=$TRAVIS_COMMIT"
