language: go
go:
  - "1.21.x"

env:
  - GO111MODULE=on

stages:
  - build
  - lint
  - test
  - docker
  - deploy

jobs:
  include:
    - stage: build
      script: go build -v -o bin/app ./...

    - stage: lint
      script: go vet ./...

    - stage: test
      script: go test -v -race -coverprofile=coverage.out ./...

    - stage: docker
      services:
        - docker
      script:
        - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
        - docker build -t myregistry/go-app:$TRAVIS_COMMIT -t myregistry/go-app:latest .
        - docker push myregistry/go-app:$TRAVIS_COMMIT
        - docker push myregistry/go-app:latest

    - stage: deploy
      script: |
        echo "Deploying myregistry/go-app:$TRAVIS_COMMIT to staging"
        # Docker: docker run -d -p 8080:8080 myregistry/go-app:$TRAVIS_COMMIT
        # docker-compose up -d
        # Kubernetes: kubectl set image deployment/go-app go-app=myregistry/go-app:$TRAVIS_COMMIT
        # helm upgrade --install go-app ./chart --set image.tag=$TRAVIS_COMMIT
