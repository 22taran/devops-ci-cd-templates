language: rust
rust:
  - stable

cache: cargo

stages:
  - build
  - lint
  - test
  - docker
  - deploy

jobs:
  include:
    - stage: build
      script: cargo build --release

    - stage: lint
      script:
        - rustup component add clippy rustfmt
        - cargo clippy -- -D warnings
        - cargo fmt -- --check

    - stage: test
      script: cargo test --verbose

    - stage: docker
      name: "Docker Build"
      services: docker
      script:
        - docker build -t myregistry/rust-app:$TRAVIS_COMMIT -t myregistry/rust-app:latest .

    - stage: docker
      name: "Docker Push"
      services: docker
      script:
        - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
        - docker push myregistry/rust-app:$TRAVIS_COMMIT
        - docker push myregistry/rust-app:latest

    - stage: deploy
      name: "Deploy"
      script:
        - echo "Deploying myregistry/rust-app:$TRAVIS_COMMIT to staging"
        - "# Docker: docker run -d -p 8080:8080 myregistry/rust-app:$TRAVIS_COMMIT"
        - "# docker-compose up -d"
        - "# Kubernetes: kubectl set image deployment/rust-app rust-app=myregistry/rust-app:$TRAVIS_COMMIT"
        - "# helm upgrade --install rust-app ./chart --set image.tag=$TRAVIS_COMMIT"
