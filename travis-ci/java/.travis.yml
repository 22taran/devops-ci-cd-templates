# ---------------------------------------------------------------------------
# Travis CI Pipeline -- Java (Maven)
# Stages: build -> lint -> test -> docker -> deploy
# Requires: DOCKER_USERNAME, DOCKER_PASSWORD env vars
# ---------------------------------------------------------------------------

language: java
jdk:
  - openjdk17

# Cache Maven .m2 to speed up dependency resolution
cache:
  directories:
    - $HOME/.m2

stages:
  - build
  - lint
  - test
  - docker
  - deploy

jobs:
  include:
    - stage: build
      name: "Build"
      script: mvn clean compile package -DskipTests -B

    - stage: lint
      name: "Lint"
      script: mvn checkstyle:check -B

    - stage: test
      name: "Test"
      script: mvn test -B

    - stage: docker
      name: "Docker Build"
      services:
        - docker
      script:
        - docker build -t myregistry/java-app:$TRAVIS_COMMIT -t myregistry/java-app:latest .

    - stage: docker
      name: "Docker Push"
      services:
        - docker
      script:
        - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
        - docker push myregistry/java-app:$TRAVIS_COMMIT
        - docker push myregistry/java-app:latest

    - stage: deploy
      name: "Deploy"
      script:
        - echo "Deploying myregistry/java-app:$TRAVIS_COMMIT to staging"
        # Docker: docker run -d -p 8080:8080 myregistry/java-app:$TRAVIS_COMMIT
        # docker-compose up -d
        # Kubernetes: kubectl set image deployment/java-app java-app=myregistry/java-app:$TRAVIS_COMMIT
        # helm upgrade --install java-app ./chart --set image.tag=$TRAVIS_COMMIT
