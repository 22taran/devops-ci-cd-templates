language: csharp
dotnet: 8.0
mono: none

stages:
  - build
  - lint
  - test
  - docker
  - deploy

jobs:
  include:
    - stage: build
      script:
        - dotnet restore
        - dotnet build --configuration Release

    - stage: lint
      script: dotnet format --verify-no-changes

    - stage: test
      script: dotnet test --configuration Release

    - stage: docker
      name: "Docker Build"
      services: docker
      script:
        - docker build -t myregistry/dotnet-app:$TRAVIS_COMMIT -t myregistry/dotnet-app:latest .

    - stage: docker
      name: "Docker Push"
      services: docker
      script:
        - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
        - docker push myregistry/dotnet-app:$TRAVIS_COMMIT
        - docker push myregistry/dotnet-app:latest

    - stage: deploy
      name: "Deploy"
      script:
        - echo "Deploying myregistry/dotnet-app:$TRAVIS_COMMIT to staging"
        - "# Docker: docker run -d -p 8080:8080 myregistry/dotnet-app:$TRAVIS_COMMIT"
        - "# docker-compose up -d"
        - "# Kubernetes: kubectl set image deployment/dotnet-app dotnet-app=myregistry/dotnet-app:$TRAVIS_COMMIT"
        - "# helm upgrade --install dotnet-app ./chart --set image.tag=$TRAVIS_COMMIT"
