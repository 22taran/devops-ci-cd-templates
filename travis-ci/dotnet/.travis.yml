language: csharp
dotnet: 8.0
mono: none

stages:
  - build
  - lint
  - test
  - docker
  - deploy

jobs:
  include:
    - stage: build
      script:
        - dotnet restore
        - dotnet build --configuration Release

    - stage: lint
      script: dotnet format --verify-no-changes

    - stage: test
      script: dotnet test --configuration Release

    - stage: docker
      if: branch = main
      services: docker
      script:
        - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
        - docker build -t myregistry/dotnet-app:$TRAVIS_COMMIT .
        - docker push myregistry/dotnet-app:$TRAVIS_COMMIT

    - stage: deploy
      if: branch = main
      script: echo "Deploying to staging"
