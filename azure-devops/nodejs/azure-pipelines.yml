trigger:
  branches:
    include: [main, develop]

pool:
  vmImage: 'ubuntu-latest'

variables:
  DOCKER_IMAGE: 'myregistry/nodejs-app'

stages:
  - stage: Build
    displayName: '🔨 Build'
    jobs:
      - job: Build
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '18.x'
          - script: npm ci
            displayName: 'Install dependencies'

  - stage: Lint
    displayName: '🔍 Lint'
    dependsOn: Build
    jobs:
      - job: Lint
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '18.x'
          - script: |
              npm ci
              npm run lint

  - stage: Test
    displayName: '🧪 Test'
    dependsOn: Build
    jobs:
      - job: Test
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '18.x'
          - script: |
              npm ci
              npm test -- --coverage --ci
          - task: PublishCodeCoverageResults@2
            inputs:
              summaryFileLocation: 'coverage/cobertura-coverage.xml'

  - stage: Docker
    displayName: '🐳 Docker'
    dependsOn: [Lint, Test]
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: Docker
        steps:
          - task: Docker@2
            inputs:
              containerRegistry: 'docker-hub-connection'
              repository: $(DOCKER_IMAGE)
              command: 'buildAndPush'
              tags: |
                $(Build.BuildId)
                latest

  - stage: Deploy
    displayName: '🚀 Deploy'
    dependsOn: Docker
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: Deploy
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo "Deploying to staging"
