trigger:
  branches:
    include: [main, develop]

pool:
  vmImage: 'ubuntu-latest'

variables:
  DOCKER_IMAGE: 'myregistry/python-app'

stages:
  - stage: Build
    displayName: '🔨 Build'
    jobs:
      - job: Build
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'
          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt

  - stage: Lint
    displayName: '🔍 Lint'
    jobs:
      - job: Lint
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'
          - script: |
              pip install flake8
              flake8 app.py --max-line-length=120

  - stage: Test
    displayName: '🧪 Test'
    dependsOn: Build
    jobs:
      - job: Test
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'
          - script: |
              pip install -r requirements.txt
              pytest tests/ -v --cov=. --cov-report=xml --junitxml=test-results.xml
          - task: PublishTestResults@2
            inputs:
              testResultsFiles: 'test-results.xml'
          - task: PublishCodeCoverageResults@2
            inputs:
              summaryFileLocation: 'coverage.xml'

  - stage: Docker
    displayName: '🐳 Docker'
    dependsOn: [Lint, Test]
    jobs:
      - job: Docker
        steps:
          - task: Docker@2
            inputs:
              containerRegistry: 'docker-hub-connection'
              repository: $(DOCKER_IMAGE)
              command: 'build'
              Dockerfile: 'Dockerfile'
              tags: |
                $(Build.BuildId)
                latest
          - task: Docker@2
            inputs:
              containerRegistry: 'docker-hub-connection'
              repository: $(DOCKER_IMAGE)
              command: 'push'
              tags: |
                $(Build.BuildId)
                latest

  - stage: Deploy
    displayName: '🚀 Deploy'
    dependsOn: Docker
    jobs:
      - deployment: Deploy
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo "Deploying $(DOCKER_IMAGE):$(Build.BuildId) to staging"
                    # Docker: docker run -d -p 8080:8080 $(DOCKER_IMAGE):$(Build.BuildId)
                    # docker-compose up -d
                    # Kubernetes: kubectl set image deployment/python-app python-app=$(DOCKER_IMAGE):$(Build.BuildId)
                    # helm upgrade --install python-app ./chart --set image.tag=$(Build.BuildId)
