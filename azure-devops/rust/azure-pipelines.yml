trigger:
  branches:
    include: [main, develop]

pool:
  vmImage: 'ubuntu-latest'

variables:
  DOCKER_IMAGE: 'myregistry/rust-app'

stages:
  - stage: Build
    displayName: '🔨 Build'
    jobs:
      - job: Build
        steps:
          - script: |
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              source $HOME/.cargo/env
              cargo build --release

  - stage: Lint
    displayName: '🔍 Lint'
    jobs:
      - job: Lint
        steps:
          - script: |
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              source $HOME/.cargo/env
              rustup component add clippy rustfmt
              cargo clippy -- -D warnings
              cargo fmt -- --check

  - stage: Test
    displayName: '🧪 Test'
    dependsOn: Build
    jobs:
      - job: Test
        steps:
          - script: |
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              source $HOME/.cargo/env
              cargo test --verbose

  - stage: Docker
    displayName: '🐳 Docker'
    dependsOn: [Lint, Test]
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: Docker
        steps:
          - task: Docker@2
            inputs:
              containerRegistry: 'docker-hub-connection'
              repository: $(DOCKER_IMAGE)
              command: 'buildAndPush'
              tags: |
                $(Build.BuildId)
                latest

  - stage: Deploy
    displayName: '🚀 Deploy'
    dependsOn: Docker
    jobs:
      - deployment: Deploy
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo "Deploying to staging"
