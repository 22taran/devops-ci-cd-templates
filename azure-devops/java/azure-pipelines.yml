# Requires: Docker registry service connection, variable groups
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Azure DevOps Pipeline -- Java (Maven)
# Stages: Build -> Lint -> Test -> Docker -> Deploy
# Requires: Docker registry service connection
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Azure DevOps Pipeline -- Java (Maven)
# Stages: Build -> Lint -> Test -> Docker -> Deploy
# Requires: Docker registry service connection
# ---------------------------------------------------------------------------

trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  DOCKER_IMAGE: 'myregistry/java-app'
  MAVEN_CACHE_FOLDER: $(HOME)/.m2/repository

stages:
  - stage: Build
    displayName: '🔨 Build'
    jobs:
      - job: Build
        steps:
          - task: Maven@4
            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'clean compile package'
              options: '-DskipTests -B'
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '1.17'
          - publish: target/
            artifact: java-build

  - stage: Lint
    displayName: '🔍 Lint'
    jobs:
      - job: Lint
        steps:
          - task: Maven@4
            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'checkstyle:check'
              options: '-B'
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '1.17'

  - stage: Test
    displayName: '🧪 Test'
    dependsOn: Build
    jobs:
      - job: Test
        steps:
          - task: Maven@4
            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'test'
              options: '-B'
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '1.17'
              publishJUnitResults: true
              testResultsFiles: '**/surefire-reports/TEST-*.xml'
              codeCoverageToolOption: 'JaCoCo'

  - stage: Docker
    displayName: '🐳 Docker'
    dependsOn: [Lint, Test]
    jobs:
      - job: Docker
        steps:
          - task: Docker@2
            displayName: 'Build image'
            inputs:
              containerRegistry: 'docker-hub-connection'
              repository: $(DOCKER_IMAGE)
              command: 'build'
              Dockerfile: 'Dockerfile'
              tags: |
                $(Build.BuildId)
                latest
          - task: Docker@2
            displayName: 'Push image'
            inputs:
              containerRegistry: 'docker-hub-connection'
              repository: $(DOCKER_IMAGE)
              command: 'push'
              tags: |
                $(Build.BuildId)
                latest

  - stage: Deploy
    displayName: '🚀 Deploy'
    dependsOn: DockerPush
    jobs:
      - deployment: Deploy
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo "Deploying $(DOCKER_IMAGE):$(Build.BuildId) to staging"
                    # Docker: docker run -d -p 8080:8080 $(DOCKER_IMAGE):$(Build.BuildId)
                    # docker-compose up -d
                    # Kubernetes: kubectl set image deployment/java-app java-app=$(DOCKER_IMAGE):$(Build.BuildId)
                    # helm upgrade --install java-app ./chart --set image.tag=$(Build.BuildId)
