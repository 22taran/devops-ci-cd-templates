trigger:
  branches:
    include: [main, develop]

pool:
  vmImage: 'ubuntu-latest'

variables:
  DOCKER_IMAGE: 'myregistry/go-app'

stages:
  - stage: Build
    displayName: '🔨 Build'
    jobs:
      - job: Build
        steps:
          - task: GoTool@0
            inputs:
              version: '1.21'
          - script: go build -v -o bin/app ./...

  - stage: Lint
    displayName: '🔍 Lint'
    jobs:
      - job: Lint
        steps:
          - task: GoTool@0
            inputs:
              version: '1.21'
          - script: go vet ./...

  - stage: Test
    displayName: '🧪 Test'
    dependsOn: Build
    jobs:
      - job: Test
        steps:
          - task: GoTool@0
            inputs:
              version: '1.21'
          - script: go test -v -race -coverprofile=coverage.out ./...

  - stage: Docker
    displayName: '🐳 Docker'
    dependsOn: [Lint, Test]
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: Docker
        steps:
          - task: Docker@2
            inputs:
              containerRegistry: 'docker-hub-connection'
              repository: $(DOCKER_IMAGE)
              command: 'buildAndPush'
              tags: |
                $(Build.BuildId)
                latest

  - stage: Deploy
    displayName: '🚀 Deploy'
    dependsOn: Docker
    jobs:
      - deployment: Deploy
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo "Deploying to staging"
