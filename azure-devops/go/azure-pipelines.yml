trigger:
  branches:
    include: [main, develop]

pool:
  vmImage: 'ubuntu-latest'

variables:
  DOCKER_IMAGE: 'myregistry/go-app'

stages:
  - stage: Build
    displayName: '🔨 Build'
    jobs:
      - job: Build
        steps:
          - task: GoTool@0
            inputs:
              version: '1.21'
          - script: go build -v -o bin/app ./...

  - stage: Lint
    displayName: '🔍 Lint'
    jobs:
      - job: Lint
        steps:
          - task: GoTool@0
            inputs:
              version: '1.21'
          - script: go vet ./...

  - stage: Test
    displayName: '🧪 Test'
    dependsOn: Build
    jobs:
      - job: Test
        steps:
          - task: GoTool@0
            inputs:
              version: '1.21'
          - script: go test -v -race -coverprofile=coverage.out ./...

  - stage: Docker
    displayName: '🐳 Docker'
    dependsOn: [Lint, Test]
    jobs:
      - job: Docker
        steps:
          - task: Docker@2
            inputs:
              containerRegistry: 'docker-hub-connection'
              repository: $(DOCKER_IMAGE)
              command: 'build'
              tags: |
                $(Build.BuildId)
                latest
          - task: Docker@2
            inputs:
              containerRegistry: 'docker-hub-connection'
              repository: $(DOCKER_IMAGE)
              command: 'push'
              tags: |
                $(Build.BuildId)
                latest

  - stage: Deploy
    displayName: '🚀 Deploy'
    dependsOn: Docker
    jobs:
      - deployment: Deploy
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo "Deploying $(DOCKER_IMAGE):$(Build.BuildId) to staging"
                    # Docker: docker run -d -p 8080:8080 $(DOCKER_IMAGE):$(Build.BuildId)
                    # docker-compose up -d
                    # Kubernetes: kubectl set image deployment/go-app go-app=$(DOCKER_IMAGE):$(Build.BuildId)
                    # helm upgrade --install go-app ./chart --set image.tag=$(Build.BuildId)
