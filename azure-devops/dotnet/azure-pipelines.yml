trigger:
  branches:
    include: [main, develop]

pool:
  vmImage: 'ubuntu-latest'

variables:
  DOCKER_IMAGE: 'myregistry/dotnet-app'

stages:
  - stage: Build
    displayName: '🔨 Build'
    jobs:
      - job: Build
        steps:
          - task: UseDotNet@2
            inputs:
              version: '8.0.x'
          - script: |
              dotnet restore
              dotnet build --configuration Release
              dotnet publish --configuration Release --output ./publish
          - publish: publish/
            artifact: dotnet-build

  - stage: Lint
    displayName: '🔍 Lint'
    jobs:
      - job: Lint
        steps:
          - task: UseDotNet@2
            inputs:
              version: '8.0.x'
          - script: dotnet format --verify-no-changes

  - stage: Test
    displayName: '🧪 Test'
    dependsOn: Build
    jobs:
      - job: Test
        steps:
          - task: UseDotNet@2
            inputs:
              version: '8.0.x'
          - task: DotNetCoreCLI@2
            inputs:
              command: 'test'
              arguments: '--configuration Release --collect:"XPlat Code Coverage"'

  - stage: Docker
    displayName: '🐳 Docker'
    dependsOn: [Lint, Test]
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: Docker
        steps:
          - task: Docker@2
            inputs:
              containerRegistry: 'docker-hub-connection'
              repository: $(DOCKER_IMAGE)
              command: 'buildAndPush'
              tags: |
                $(Build.BuildId)
                latest

  - stage: Deploy
    displayName: '🚀 Deploy'
    dependsOn: Docker
    jobs:
      - deployment: Deploy
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo "Deploying to staging"
