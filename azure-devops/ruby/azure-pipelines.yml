trigger:
  branches:
    include: [main, develop]

pool:
  vmImage: 'ubuntu-latest'

variables:
  DOCKER_IMAGE: 'myregistry/ruby-app'

stages:
  - stage: Build
    displayName: '🔨 Build'
    jobs:
      - job: Build
        steps:
          - task: UseRubyVersion@0
            inputs:
              versionSpec: '3.3'
          - script: bundle install

  - stage: Lint
    displayName: '🔍 Lint'
    dependsOn: Build
    jobs:
      - job: Lint
        steps:
          - task: UseRubyVersion@0
            inputs:
              versionSpec: '3.3'
          - script: |
              bundle install
              bundle exec rubocop

  - stage: Test
    displayName: '🧪 Test'
    dependsOn: Build
    jobs:
      - job: Test
        steps:
          - task: UseRubyVersion@0
            inputs:
              versionSpec: '3.3'
          - script: |
              bundle install
              bundle exec rspec --format documentation

  - stage: Docker
    displayName: '🐳 Docker'
    dependsOn: [Lint, Test]
    jobs:
      - job: Docker
        steps:
          - task: Docker@2
            inputs:
              containerRegistry: 'docker-hub-connection'
              repository: $(DOCKER_IMAGE)
              command: 'build'
              Dockerfile: 'Dockerfile'
              tags: |
                $(Build.BuildId)
                latest
          - task: Docker@2
            inputs:
              containerRegistry: 'docker-hub-connection'
              repository: $(DOCKER_IMAGE)
              command: 'push'
              tags: |
                $(Build.BuildId)
                latest

  - stage: Deploy
    displayName: '🚀 Deploy'
    dependsOn: Docker
    jobs:
      - deployment: Deploy
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo "Deploying $(DOCKER_IMAGE):$(Build.BuildId) to staging"
                    # Docker: docker run -d -p 8080:8080 $(DOCKER_IMAGE):$(Build.BuildId)
                    # docker-compose up -d
                    # Kubernetes: kubectl set image deployment/ruby-app ruby-app=$(DOCKER_IMAGE):$(Build.BuildId)
                    # helm upgrade --install ruby-app ./chart --set image.tag=$(Build.BuildId)
