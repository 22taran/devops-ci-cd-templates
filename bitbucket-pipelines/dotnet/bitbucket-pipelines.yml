image: mcr.microsoft.com/dotnet/sdk:8.0

pipelines:
  default:
    - step:
        name: Build & Lint
        script:
          - dotnet restore
          - dotnet build --configuration Release
          - dotnet format --verify-no-changes

    - step:
        name: Test
        script:
          - dotnet test --configuration Release

    - step:
        name: Docker Build
        services:
          - docker
        script:
          - docker build -t myregistry/dotnet-app:$BITBUCKET_COMMIT -t myregistry/dotnet-app:latest .

    - step:
        name: Docker Push
        services:
          - docker
        script:
          - echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
          - docker push myregistry/dotnet-app:$BITBUCKET_COMMIT
          - docker push myregistry/dotnet-app:latest

    - step:
        name: Deploy
        deployment: staging
        script:
          - echo "Deploying to staging"
          - "# Docker: docker run -d -p 8080:8080 myregistry/dotnet-app:$BITBUCKET_COMMIT"
          - "# Kubernetes: kubectl set image deployment/dotnet-app dotnet-app=myregistry/dotnet-app:$BITBUCKET_COMMIT"
