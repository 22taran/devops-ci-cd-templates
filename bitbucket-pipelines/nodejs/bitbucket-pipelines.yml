image: node:18

pipelines:
  default:
    - step:
        name: Install & Lint
        caches:
          - node
        script:
          - npm ci
          - npm run lint

    - step:
        name: Test
        caches:
          - node
        script:
          - npm ci
          - npm test -- --coverage --ci

    - step:
        name: Docker Build
        services:
          - docker
        script:
          - docker build -t myregistry/nodejs-app:$BITBUCKET_COMMIT -t myregistry/nodejs-app:latest .

    - step:
        name: Docker Push
        services:
          - docker
        script:
          - echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
          - docker push myregistry/nodejs-app:$BITBUCKET_COMMIT
          - docker push myregistry/nodejs-app:latest

    - step:
        name: Deploy
        deployment: staging
        script:
          - echo "Deploying to staging"
          - "# Docker: docker run -d -p 8080:8080 myregistry/nodejs-app:$BITBUCKET_COMMIT"
          - "# Kubernetes: kubectl set image deployment/nodejs-app nodejs-app=myregistry/nodejs-app:$BITBUCKET_COMMIT"
