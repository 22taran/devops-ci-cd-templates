image: rust:1.73

pipelines:
  default:
    - step:
        name: Build & Lint
        caches:
          - cargo
        script:
          - cargo build --release
          - rustup component add clippy rustfmt
          - cargo clippy -- -D warnings
          - cargo fmt -- --check

    - step:
        name: Test
        caches:
          - cargo
        script:
          - cargo test --verbose

    - step:
        name: Docker Build
        services:
          - docker
        script:
          - docker build -t myregistry/rust-app:$BITBUCKET_COMMIT -t myregistry/rust-app:latest .

    - step:
        name: Docker Push
        services:
          - docker
        script:
          - echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
          - docker push myregistry/rust-app:$BITBUCKET_COMMIT
          - docker push myregistry/rust-app:latest

    - step:
        name: Deploy
        deployment: staging
        script:
          - echo "Deploying to staging"
          - "# Docker: docker run -d -p 8080:8080 myregistry/rust-app:$BITBUCKET_COMMIT"
          - "# Kubernetes: kubectl set image deployment/rust-app rust-app=myregistry/rust-app:$BITBUCKET_COMMIT"

definitions:
  caches:
    cargo: ~/.cargo
