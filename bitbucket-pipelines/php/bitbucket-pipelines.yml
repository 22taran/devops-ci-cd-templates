image: php:8.2-cli

pipelines:
  default:
    - step:
        name: Install & Lint
        script:
          - apt-get update && apt-get install -y unzip
          - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
          - composer install --no-interaction --prefer-dist
          - vendor/bin/phpcs src/ --standard=PSR12

    - step:
        name: Test
        script:
          - apt-get update && apt-get install -y unzip
          - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
          - composer install --no-interaction --prefer-dist
          - vendor/bin/phpunit tests/

    - step:
        name: Docker Build
        services:
          - docker
        script:
          - docker build -t myregistry/php-app:$BITBUCKET_COMMIT -t myregistry/php-app:latest .

    - step:
        name: Docker Push
        services:
          - docker
        script:
          - echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
          - docker push myregistry/php-app:$BITBUCKET_COMMIT
          - docker push myregistry/php-app:latest

    - step:
        name: Deploy
        deployment: staging
        script:
          - echo "Deploying to staging"
          - "# Docker: docker run -d -p 8080:8080 myregistry/php-app:$BITBUCKET_COMMIT"
          - "# Kubernetes: kubectl set image deployment/php-app php-app=myregistry/php-app:$BITBUCKET_COMMIT"
