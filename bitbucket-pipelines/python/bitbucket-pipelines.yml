image: python:3.12-slim

pipelines:
  default:
    - step:
        name: Lint
        caches:
          - pip
        script:
          - pip install flake8
          - flake8 app.py --max-line-length=120

    - step:
        name: Test
        caches:
          - pip
        script:
          - pip install -r requirements.txt
          - pytest tests/ -v --cov=.

    - step:
        name: Docker Build
        services:
          - docker
        script:
          - docker build -t myregistry/python-app:$BITBUCKET_COMMIT -t myregistry/python-app:latest .

    - step:
        name: Docker Push
        services:
          - docker
        script:
          - echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
          - docker push myregistry/python-app:$BITBUCKET_COMMIT
          - docker push myregistry/python-app:latest

    - step:
        name: Deploy
        deployment: staging
        script:
          - echo "Deploying to staging"
          - "# Docker: docker run -d -p 8080:8080 myregistry/python-app:$BITBUCKET_COMMIT"
          - "# Kubernetes: kubectl set image deployment/python-app python-app=myregistry/python-app:$BITBUCKET_COMMIT"
