# ---------------------------------------------------------------------------
# Bitbucket Pipelines -- Java (Maven)
# Steps: Build -> Lint -> Test -> Docker Build -> Docker Push -> Deploy
# Requires: DOCKER_USERNAME, DOCKER_PASSWORD repo variables
# ---------------------------------------------------------------------------

image: maven:3.9-eclipse-temurin-17

pipelines:
  default:
    - step:
        name: Build
        caches:
          - maven
        script:
          - mvn clean compile -B
          - mvn package -DskipTests -B
        artifacts:
          - target/*.jar

    - step:
        name: Lint
        caches:
          - maven
        script:
          - mvn checkstyle:check -B

    - step:
        name: Test
        caches:
          - maven
        script:
          - mvn test -B

    - step:
        name: Docker Build
        services:
          - docker
        script:
          - docker build -t myregistry/java-app:$BITBUCKET_COMMIT .
          - docker tag myregistry/java-app:$BITBUCKET_COMMIT myregistry/java-app:latest

    - step:
        name: Docker Push
        services:
          - docker
        script:
          - echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
          - docker push myregistry/java-app:$BITBUCKET_COMMIT
          - docker push myregistry/java-app:latest

    - step:
        name: Deploy
        deployment: staging
        script:
          - echo "Deploying myregistry/java-app:$BITBUCKET_COMMIT to staging"
          - "# Docker: docker run -d -p 8080:8080 myregistry/java-app:$BITBUCKET_COMMIT"
          - "# docker-compose up -d"
          - "# Kubernetes: kubectl set image deployment/java-app java-app=myregistry/java-app:$BITBUCKET_COMMIT"
          - "# helm upgrade --install java-app ./chart --set image.tag=$BITBUCKET_COMMIT"

definitions:
  services:
    docker:
      memory: 2048
