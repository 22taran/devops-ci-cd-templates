version: 0.2

env:
  variables:
    ECR_REPO: your-account-id.dkr.ecr.us-east-1.amazonaws.com/ruby-app

phases:
  install:
    runtime-versions:
      ruby: 3.3
    commands:
      - bundle install

  pre_build:
    commands:
      - echo "Running lint..."
      - bundle exec rubocop
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPO

  build:
    commands:
      - echo "Running tests..."
      - bundle exec rspec
      - docker build -t $ECR_REPO:$CODEBUILD_RESOLVED_SOURCE_VERSION .

  post_build:
    commands:
      - docker push $ECR_REPO:$CODEBUILD_RESOLVED_SOURCE_VERSION
      - printf '[{"name":"ruby-app","imageUri":"%s"}]' $ECR_REPO:$CODEBUILD_RESOLVED_SOURCE_VERSION > imagedefinitions.json
      - echo "Deploy: Use CodePipeline deploy stage. Docker: docker run -d -p 8080:8080 $ECR_REPO:$CODEBUILD_RESOLVED_SOURCE_VERSION | K8s: kubectl set image deployment/ruby-app ruby-app=$ECR_REPO:$CODEBUILD_RESOLVED_SOURCE_VERSION"

artifacts:
  files:
    - imagedefinitions.json

cache:
  paths:
    - "vendor/bundle/**/*"
