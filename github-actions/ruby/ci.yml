# ---------------------------------------------------------------------------
# GitHub Actions Workflow -- Ruby
# Jobs: Build -> Lint, Test (parallel) -> Docker -> Deploy
# Requires: DOCKER_USERNAME, DOCKER_PASSWORD secrets
# ---------------------------------------------------------------------------

name: Ruby CI/CD Pipeline

# Trigger on push to main/develop and on PRs to main
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  RUBY_VERSION: '3.3'
  DOCKER_IMAGE: myregistry/ruby-app

jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby ${{ env.RUBY_VERSION }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rubocop

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        ruby-version: ['3.1', '3.2', '3.3']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Run RSpec
        run: bundle exec rspec --format documentation

  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push image
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.DOCKER_IMAGE }}:latest

  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: docker
    environment: staging
    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying ${{ env.DOCKER_IMAGE }}:${{ github.sha }} to staging"
          # Docker: docker run -d -p 8080:8080 ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          # docker-compose up -d
          # Kubernetes: kubectl set image deployment/ruby-app ruby-app=${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          # helm upgrade --install ruby-app ./chart --set image.tag=${{ github.sha }}
