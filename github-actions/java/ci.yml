# ---------------------------------------------------------------------------
# GitHub Actions Workflow -- Java (Maven)
# Jobs: Build -> Lint, Test (parallel) -> Docker -> Deploy
# Requires: DOCKER_USERNAME, DOCKER_PASSWORD secrets
# ---------------------------------------------------------------------------

name: Java CI/CD Pipeline

# Trigger on push to main/develop and on PRs to main
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Shared env vars. DOCKER_IMAGE: customize for your registry (e.g., ghcr.io/org/repo)
env:
  JAVA_VERSION: '17'
  DOCKER_IMAGE: myregistry/java-app

jobs:
  # Compile and package. cache: maven speeds up dependency resolution.
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # -B batch mode (non-interactive). clean removes previous artifacts
      - name: Build with Maven
        run: mvn clean compile -B

      # -DskipTests avoids re-running tests (already run in test job)
      - name: Package
        run: mvn package -DskipTests -B

      # Artifact available to downstream jobs or for download
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: target/*.jar

  # Checkstyle enforces code style. Fails on violations.
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check -B

  # Unit tests with JaCoCo coverage. needs: build ensures build succeeds first.
  # Unit tests with JaCoCo coverage. needs: build ensures build ran first.
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests with coverage
        run: mvn test -B

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/

  # Build and push Docker image. Two steps: build (load to local), then push.
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push image
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.DOCKER_IMAGE }}:latest

  # Deploy to staging. Replace with your deployment.
  # Docker: docker run -d -p 8080:8080 IMAGE:TAG | docker-compose up -d
  # Kubernetes: kubectl set image deployment/... | helm upgrade --install
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: docker
    environment: staging
    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying ${{ env.DOCKER_IMAGE }}:${{ github.sha }} to staging"
          # Docker: docker run -d -p 8080:8080 ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          # docker-compose up -d
          # Kubernetes: kubectl set image deployment/java-app java-app=${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          # helm upgrade --install java-app ./chart --set image.tag=${{ github.sha }}
