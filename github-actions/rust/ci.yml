# ---------------------------------------------------------------------------
# GitHub Actions Workflow -- Rust
# Jobs: Build -> Lint, Test (parallel) -> Docker -> Deploy
# Requires: DOCKER_USERNAME, DOCKER_PASSWORD secrets
# ---------------------------------------------------------------------------

name: Rust CI/CD Pipeline

# Trigger on push to main/develop and on PRs to main
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  DOCKER_IMAGE: myregistry/rust-app

jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: rust-binary
          path: target/release/sample-rust-app

  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Check formatting
        run: cargo fmt -- --check

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --verbose

  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push image
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.DOCKER_IMAGE }}:latest

  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: docker
    environment: staging
    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying ${{ env.DOCKER_IMAGE }}:${{ github.sha }} to staging"
          # Docker: docker run -d -p 8080:8080 ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          # docker-compose up -d
          # Kubernetes: kubectl set image deployment/rust-app rust-app=${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          # helm upgrade --install rust-app ./chart --set image.tag=${{ github.sha }}
